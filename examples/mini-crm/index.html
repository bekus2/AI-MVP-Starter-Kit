<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini CRM Example</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --border: #d0d7de;
      --primary: #0969da;
      --danger: #cf222e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 24px;
    }

    main {
      margin: 0 auto;
      max-width: 1120px;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 360px minmax(0, 1fr);
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
    }

    form,
    .field {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: 800;
    }

    input,
    select,
    button {
      border-radius: 8px;
      font: inherit;
      min-height: 42px;
      padding: 10px 12px;
    }

    input,
    select {
      border: 1px solid var(--border);
      width: 100%;
    }

    button {
      background: var(--primary);
      border: 0;
      color: #ffffff;
      cursor: pointer;
      font-weight: 800;
    }

    .button-danger {
      background: var(--danger);
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .lead-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .lead-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Mini CRM Example</h1>
    <p class="muted">A browser-only CRM demo for adding leads, changing status, and deleting records.</p>

    <div class="grid">
      <section>
        <h2>Add Lead</h2>
        <form id="crmForm" novalidate>
          <div class="field">
            <label for="crmName">Name</label>
            <input id="crmName" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="crmEmail">Email</label>
            <input id="crmEmail" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="crmStatus">Status</label>
            <select id="crmStatus" name="status">
              <option value="New">New</option>
              <option value="Contacted">Contacted</option>
              <option value="Qualified">Qualified</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
          <button type="submit">Add lead</button>
          <p id="crmMessage" class="muted" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section>
        <h2>Leads</h2>
        <div id="crmList" class="cards"></div>
      </section>
    </div>
  </main>

  <script>
    /**
     * EN: Escapes lead values before rendering CRM cards.
     * RU: Экранирует значения lead перед выводом CRM cards.
     */
    function escapeHTML(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    const key = "miniCrmExample:leads";
    const form = document.getElementById("crmForm");
    const list = document.getElementById("crmList");
    const message = document.getElementById("crmMessage");

    function getLeads() {
      return JSON.parse(localStorage.getItem(key) || "[]");
    }

    function setLeads(leads) {
      localStorage.setItem(key, JSON.stringify(leads));
    }

    function render() {
      const leads = getLeads();
      if (!leads.length) {
        list.innerHTML = '<p class="muted">No leads yet.</p>';
        return;
      }

      list.innerHTML = leads.map((lead) => `
        <article class="lead-card">
          <strong>${escapeHTML(lead.name)}</strong>
          <p class="muted">${escapeHTML(lead.email)}</p>
          <p>Status: <strong>${escapeHTML(lead.status)}</strong></p>
          <div class="lead-actions">
            <button type="button" data-action="status" data-id="${lead.id}">Next status</button>
            <button type="button" class="button-danger" data-action="delete" data-id="${lead.id}">Delete</button>
          </div>
        </article>
      `).join("");
    }

    function nextStatus(status) {
      const statuses = ["New", "Contacted", "Qualified", "Closed"];
      const currentIndex = statuses.indexOf(status);
      return statuses[(currentIndex + 1) % statuses.length];
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const name = String(data.get("name") || "").trim();
      const email = String(data.get("email") || "").trim();
      const status = String(data.get("status") || "New");

      if (name.length < 2 || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        message.textContent = "Enter a valid name and email.";
        return;
      }

      const leads = getLeads();
      leads.unshift({ id: String(Date.now()), name, email, status });
      setLeads(leads);
      form.reset();
      message.textContent = "Lead added.";
      render();
    });

    list.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const leads = getLeads();
      const id = button.dataset.id;
      const action = button.dataset.action;

      if (action === "delete") {
        setLeads(leads.filter((lead) => lead.id !== id));
        render();
        return;
      }

      const updated = leads.map((lead) => lead.id === id ? { ...lead, status: nextStatus(lead.status) } : lead);
      setLeads(updated);
      render();
    });

    render();
  </script>
</body>
</html>
